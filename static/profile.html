<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Profile</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/static/styles.css?v=142" />
  </head>
  <body>
    <nav class="site-nav">
      <a href="/create-profile">Account</a>
      <a href="/new-progress">New Daily Progress</a>
      <a href="/stories">Stories</a>
      <a href="/community-feed">Community Feed</a>
      <a href="/chats">Chats</a>
      <a class="active" href="/profile">My Profile</a>
      <a href="/help-center">Help Center</a>
      <a href="/settings">Settings</a>
      <a id="profile-logout-link" href="#">Logout</a>
    </nav>

    <section class="page-head">
      <h1>My Profile</h1>
      <p>Your profile photo and your posts.</p>
    </section>

    <main>
      <section class="panel">
        <div class="profile-head">
          <div class="avatar-wrap">
            <img id="profile-avatar" class="avatar clickable" src="/static/default-avatar.svg" alt="profile" />
            <button id="avatar-edit-btn" class="avatar-edit" type="button" aria-label="Update Profile Photo">✎</button>
            <input id="profile-photo-input" type="file" accept="image/*" class="hidden" />
          </div>
          <div>
            <h2 id="profile-name"></h2>
            <p id="profile-username" class="notice"></p>
            <div class="profile-stats">
              <span><strong id="posts-count">0</strong> posts</span>
              <button id="followers-stat-btn" class="stat-link" type="button"><strong id="followers-count">0</strong> followers</button>
              <button id="following-stat-btn" class="stat-link" type="button"><strong id="following-count">0</strong> following</button>
            </div>
            <div class="bio-edit-wrap">
              <p id="profile-bio"></p>
              <button id="bio-edit-trigger" class="bio-edit-bubble" type="button">Edit Bio</button>
            </div>
          </div>
        </div>
      </section>

      <section class="panel">
        <h3>My Posts</h3>
        <div id="profile-feed" class="stack"></div>
      </section>
    </main>

    <div id="dp-modal" class="dp-modal hidden">
      <div class="dp-modal-backdrop"></div>
      <div class="dp-modal-content">
        <button id="dp-modal-close" class="dp-modal-close-x" type="button" aria-label="Close">✕</button>
        <img id="dp-modal-image" src="/static/default-avatar.svg" alt="Profile Photo" />
      </div>
    </div>

    <div id="post-view-modal" class="post-view-modal hidden">
      <div class="post-view-backdrop"></div>
      <div class="post-view-content">
        <button id="post-view-close" class="post-view-close-x" type="button" aria-label="Close">✕</button>
        <div id="post-view-body"></div>
      </div>
    </div>

    <div id="follow-list-modal" class="follow-list-modal hidden">
      <div class="follow-list-backdrop"></div>
      <div class="follow-list-content">
        <div class="follow-list-head">
          <h3 id="follow-list-title">Followers</h3>
          <button id="follow-list-close" class="follow-list-close-x" type="button" aria-label="Close">✕</button>
        </div>
        <input
          id="follow-list-search"
          class="follow-list-search"
          type="text"
          placeholder="Search in this list..."
          autocomplete="off"
        />
        <div id="follow-list" class="user-results"></div>
      </div>
    </div>

    <div id="bio-modal" class="bio-modal hidden">
      <div class="bio-modal-backdrop"></div>
      <div class="bio-modal-content">
        <h3>Edit Bio</h3>
        <textarea id="bio-modal-input" maxlength="250" rows="5" placeholder="Write your bio..."></textarea>
        <div class="bio-modal-actions">
          <button id="bio-modal-cancel" class="alt" type="button">Cancel</button>
          <button id="bio-modal-done" class="bio-done-btn" type="button">Done</button>
        </div>
      </div>
    </div>

    <script src="/static/app-config.js?v=2"></script>
    <script src="/static/common.js?v=39"></script>
    <script src="/static/feed-cards.js?v=38"></script>
    <script src="/static/profile.js?v=15"></script>
  </body>
</html>
